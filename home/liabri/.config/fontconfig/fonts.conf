<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<dir>/usr/share/fonts</dir>

    <match target="font">
        <edit name="embeddedbitmap" mode="assign">
            <bool>false</bool>
        </edit>
    </match>

    <!-- Serif -->
    <alias binding="strong">
        <family>serif</family>
        <prefer>
            <family>Change</family>
        </prefer>
    </alias>

    <!-- Monospace -->
    <alias binding="strong">
        <family>monospace</family>
        <prefer>
            <family>Fira Mono</family>
        </prefer>
    </alias>

    <!-- Sans Serif -->
    <alias binding="strong">
        <family>sans-serif</family>
        <prefer>
            <family>FiraGo</family>
        </prefer>
    </alias>

	<!-- System-ui -->
	<alias binding="strong">
		<family>system-ui</family>
		<prefer>
            <family>FiraGo</family>
		</prefer>
	</alias>

	<match target="pattern">
        <edit name="family" mode="append" binding="strong">
            <string>WenYue GutiFangsong (Authorization Required)</string> <!-- Traditional Chinese Imitation Song -->
            <string>Iwata SouchouNK Pro M</string> <!-- Japanese Imitation Song-->
            <string>青鸟华光仿宋2</string> <!-- Simplified Chinese Imitation Song -->
            <string>TW-Kai</string> <!-- Taiwanese Regular Script -->
            <string>TW-Kai-Plus</string>
            <string>TW-Kai-Ext-B</string>
            <string>UnGungseo</string> <!-- Korean Regular Script-->
            <string>Free HK Kai 4700</string> <!-- HongKongese Regular Script -->
            <string>Han-Nom Kai</string> <!-- Vietnamese Chu Nom Regular Script -->
        </edit>
    </match>

	<!-- Emojis -->
	<match target="pattern">
        <test name="charset">
            <charset>
                <range>
                    <int>0x1F000</int>
                    <int>0x1FAFF</int>
                </range>
                <range>
                    <int>0x2600</int>
                    <int>0x27BF</int>
                </range>
            </charset>
        </test>
        <edit name="family" mode="prepend">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>
	<!-- Chinese (Simplified) / zh -->
	<match target="pattern">
		<test name="lang" compare="eq">
			<string>zh</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>青鸟华光仿宋2</string>
		</edit>
	</match>

	 <!-- Japanese / ja -->
	<match target="pattern">
		<test name="lang" compare="contains">
			<string>ja</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>Iwata SouchouNK Pro M</string>
		</edit>
	</match>

	<!-- Korean / kr -->
	<match target="pattern">
		<test name="lang" compare="contains">
			<string>ko</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>UnGungseo</string>
		</edit>
	</match>

	<!-- Simplified Chinese / zh-hans -->
	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-hans</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>青鸟华光仿宋2</string>
		</edit>
	</match>

	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-Hans</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>青鸟华光仿宋2</string>
		</edit>
	</match>

	<!-- Traditional Chinese / zh-hant -->
	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-hant</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>WenYue GutiFangsong (Authorization Required)</string>
		</edit>
	</match>

	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-Hant</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>WenYue GutiFangsong (Authorization Required)</string>
		</edit>
	</match>

	<!-- China's Chinese (Simplified) / zh-cn -->
	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-cn</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>青鸟华光仿宋2</string>
		</edit>
	</match>

	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-CN</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>青鸟华光仿宋2</string>
		</edit>
	</match>

	<!-- Taiwanese / zh-tw -->
	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-tw</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>TW-Kai</string>
            <string>TW-Kai-Plus</string>
            <string>TW-Kai-Ext-B</string>
		</edit>
	</match>

	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-TW</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>TW-Kai</string>
            <string>TW-Kai-Plus</string>
            <string>TW-Kai-Ext-B</string>
		</edit>
	</match>

	<!-- Honkongese / zh-hk -->
	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-HK</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>Free HK Kai 4700</string>
		</edit>
	</match>

	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-Hant-HK</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>Free HK Kai 4700</string>
		</edit>
	</match>

	<!-- Vietnamese Chu Nom / vi-Hani -->
	<match target="pattern">
		<test name="lang" compare="contains">
			<string>vi</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>Han-Nom Kai</string>
		</edit>
	</match>

	<!-- Zhuang Sawndip / ?? -->
<!-- 	<match target="pattern">
		<test name="lang" compare="contains">
			<string>zh-sp</string>
		</test>
		<edit name="family" mode="append" binding="strong">
			<string>Sawndip</string>
		</edit>
	</match> -->
</fontconfig>
